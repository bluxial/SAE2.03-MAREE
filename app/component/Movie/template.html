<article class="movie-card flex flex-col cursor-pointer overflow-hidden" onclick="C.handlerDetail('{{id}}')">
  <img src="{{image}}" alt="{{name}}" class="movie-card__image w-full block object-cover" />
  <h2 class="movie-card__title flex flex-1 items-center justify-center text-center">{{name}}</h2>
  <p class="movie-card__category text-center text-sm">{{category}}</p>
  {{favorite_button}}
</article>
