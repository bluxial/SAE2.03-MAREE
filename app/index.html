<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 - Films</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="icon" type="image/x-icon" href="../server/images/app icon.png" />
  </head>

  <body>
    <!-- En-tête (navbar) -->
    <header id="header"></header>

    <!-- Contenu principal (films) -->
    <section id="content"></section>
    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";

      window.C = {};
      let C = window.C;

      C.handlerAbout = function () {
        alert("SAE2.03 - Application films - Édition 2025");
      };

      C.handlerDetail = async function (id) {
        try {
          let movie = await DataMovie.requestMovieDetails(id);
          V.renderDetail(movie);
        } catch (error) {
          console.error("Erreur chargement détail:", error);
        }
      };

      C.handlerHome = function () {
        C.loadMovies();
      };

      C.loadMovies = async function () {
        try {
          let groupedMovies = await DataMovie.requestMoviesGroupedByCategory();
          V.renderMoviesByCategory(groupedMovies);
        } catch (error) {
          console.error("Erreur lors du chargement des films:", error);
          V.renderMoviesByCategory({});
        }
      };

      C.start = function () {
        V.renderNavBar("C.handlerAbout()", "C.handlerHome()");
        C.loadMovies();
      };

      let V = {};

      V.renderNavBar = function (handlerAbout, handlerHome) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(handlerAbout, handlerHome);
      };

      V.renderMoviesByCategory = function (groupedMovies) {
        let content = document.querySelector("#content");
        let categories = Object.keys(groupedMovies);
        if (categories.length === 0) {
          content.innerHTML = "<p>Aucun film disponible pour le moment.</p>";
          return;
        }
        let html = "";
        for (const categoryName of categories) {
          html += MovieCategory.format(
            categoryName,
            groupedMovies[categoryName],
          );
        }
        content.innerHTML = html;
      };

      V.renderDetail = function (movie) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(movie);
      };

      C.start();
    </script>
  </body>
</html>
<script type="module"></script>
