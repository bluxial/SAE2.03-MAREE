<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 - Films</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="icon" type="image/x-icon" href="../server/images/app icon.png" />
  </head>

  <body>
    <header id="header"></header>
    <section id="content"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { DataProfile } from "./data/dataProfile.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";

      window.C = {};
      let C = window.C;

      window.activeProfileId = null;

      C.handlerAbout = function () {
        alert("SAE2.03 - Application films - Édition 2025");
      };

      C.handlerDetail = async function (id) {
        try {
          let movie = await DataMovie.requestMovieDetails(id);
          V.renderDetail(movie);
        } catch (error) {
          console.error("Erreur chargement détail:", error);
        }
      };

      C.handlerHome = function () {
        C.loadMovies();
      };

      C.handlerProfile = function () {
        C.loadProfiles();
      };

      C.handlerSelectProfile = function (id, name) {
        window.activeProfileId = id;
        V.renderNavBar(
          "C.handlerAbout()",
          "C.handlerHome()",
          "C.handlerProfile()",
          name,
        );
        C.loadMovies();
      };

      C.loadProfiles = async function () {
        try {
          let profiles = await DataProfile.read();
          V.renderProfiles(profiles);
        } catch (error) {
          console.error("Erreur lors du chargement des profils:", error);
        }
      };

      C.loadMovies = async function () {
        try {
          let groupedMovies = await DataMovie.requestMoviesGroupedByCategory();
          V.renderMoviesByCategory(groupedMovies);
        } catch (error) {
          console.error("Erreur lors du chargement des films:", error);
          V.renderMoviesByCategory({});
        }
      };

      C.start = function () {
        V.renderNavBar(
          "C.handlerAbout()",
          "C.handlerHome()",
          "C.handlerProfile()",
          "Choisir un profil",
        );
        C.loadProfiles();
      };

      let V = {};

      V.renderNavBar = function (
        handlerAbout,
        handlerHome,
        handlerProfile,
        profileName,
      ) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(
          handlerAbout,
          handlerHome,
          handlerProfile,
          profileName,
        );
      };

      V.renderProfiles = function (profiles) {
        let content = document.querySelector("#content");
        let html = "<div class='profile-list'>";
        for (let profile of profiles) {
          html +=
            "<article class='profile-card' onclick=\"C.handlerSelectProfile(" +
            profile.id +
            ", '" +
            profile.name +
            "')\">";
          if (profile.avatar) {
            html +=
              "<img src='../server/images/" +
              profile.avatar +
              "' alt='" +
              profile.name +
              "' />";
          }
          html += "<p>" + profile.name + "</p>";
          html += "</article>";
        }
        html += "</div>";
        content.innerHTML = html;
      };

      V.renderMoviesByCategory = function (groupedMovies) {
        let content = document.querySelector("#content");
        let categories = Object.keys(groupedMovies);
        if (categories.length === 0) {
          content.innerHTML = "<p>Aucun film disponible pour le moment.</p>";
          return;
        }
        let html = "";
        for (const categoryName of categories) {
          html += MovieCategory.format(
            categoryName,
            groupedMovies[categoryName],
          );
        }
        content.innerHTML = html;
      };

      V.renderDetail = function (movie) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(movie);
      };

      C.start();
    </script>
  </body>
</html>
