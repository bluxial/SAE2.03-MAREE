<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 - Films</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="icon" type="image/x-icon" href="../server/images/app icon.png" />
  </head>

  <body>
    <!-- En-tête (navbar) -->
    <header id="header"></header>

    <!-- Contenu principal (films) -->
    <section id="content"></section>
    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { DataMovie } from "./data/dataMovie.js";

      let C = {};

      C.handlerAbout = function () {
        alert("SAE2.03 - Application films - Édition 2025");
      };

      C.loadMovies = async function () {
        try {
          let moviesData = await DataMovie.requestMovies();
          V.renderMovies(moviesData);
        } catch (error) {
          console.error("Erreur lors du chargement des films:", error);
          V.renderMovies([]);
        }
      };

      C.start = function () {
        V.renderNavBar("C.handlerAbout()");

        C.loadMovies();
      };

      let V = {};

      V.renderNavBar = function (handlerAbout) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(handlerAbout);
      };

      V.renderMovies = function (movies) {
        let content = document.querySelector("#content");
        content.innerHTML = Movie.formatMany(movies);
      };

      C.start();
    </script>
  </body>
</html>
<script type="module"></script>
