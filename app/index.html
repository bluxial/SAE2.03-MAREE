<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 - Films</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="icon" type="image/x-icon" href="../server/images/app icon.png" />
  </head>

  <body>
    <header id="header"></header>
    <section id="content"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { DataProfile } from "./data/dataProfile.js";
      import { DataFavorite } from "./data/dataFavorite.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";
      import { Profile } from "./component/Profile/script.js";

      window.C = {};
      let C = window.C;

      window.activeProfileId = null;

      C.handlerAbout = function() {
        alert("SAE2.03 - Application films - Édition 2025");
      };

      C.handlerDetail = async function(id) {
        let movie = await DataMovie.requestMovieDetails(id);
        let isFavorite = false;
        if (window.activeProfileId) {
          let favorites = await DataFavorite.read(window.activeProfileId);
          // on vérifie si le film est dans les favoris
          for (let i = 0; i < favorites.length; i++) {
            if (favorites[i].id == id) {
              isFavorite = true;
            }
          }
        }
        V.renderDetail(movie, isFavorite);
      };

      C.handlerAddFavorite = async function(id_movie) {
        let message = await DataFavorite.add(window.activeProfileId, id_movie);
        alert(message);
        C.loadMovies();
      };

      C.handlerHome = function() {
        C.loadMovies();
      };

      C.handlerProfile = async function() {
        if (window.activeProfileId) {
          let profiles = await DataProfile.read();
          // on cherche le profil actif
          let profile = null;
          for (let i = 0; i < profiles.length; i++) {
            if (profiles[i].id == window.activeProfileId) {
              profile = profiles[i];
            }
          }
          let favorites = await DataFavorite.read(window.activeProfileId);
          V.renderProfile(profile, favorites);
        } else {
          C.loadProfiles();
        }
      };

      C.handlerSelectProfile = function(id, name, age) {
        window.activeProfileId = id;
        window.activeProfileAge = age;
        V.renderNavBar(
          "C.handlerAbout()",
          "C.handlerHome()",
          "C.handlerProfile()",
          name,
          "<button class='navbar__change-btn' onclick='C.loadProfiles()'>Changer</button>"
        );
        C.loadMovies();
      };

      C.loadProfiles = async function() {
        let profiles = await DataProfile.read();
        V.renderProfiles(profiles);
      };

      C.loadMovies = async function() {
        let groupedMovies = await DataMovie.requestMoviesGroupedByCategory(window.activeProfileAge);
        let favorites = null;
        if (window.activeProfileId) {
          favorites = await DataFavorite.read(window.activeProfileId);
        }
        V.renderMoviesByCategory(groupedMovies, favorites);
      };

      C.start = function() {
        V.renderNavBar(
          "C.handlerAbout()",
          "C.handlerHome()",
          "C.handlerProfile()",
          "Choisir un profil"
        );
        C.loadProfiles();
      };

      let V = {};

      V.renderNavBar = function(handlerAbout, handlerHome, handlerProfile, profileName, changeProfileBtn) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(handlerAbout, handlerHome, handlerProfile, profileName, changeProfileBtn);
      };

      V.renderProfiles = function(profiles) {
        let content = document.querySelector("#content");
        let html = "<div class='profile-list flex justify-center items-center flex-wrap'>";
        for (let i = 0; i < profiles.length; i++) {
          let profile = profiles[i];
          html += "<article class='profile-card cursor-pointer text-center uppercase' onclick=\"C.handlerSelectProfile(" + profile.id + ", '" + profile.name + "', " + profile.min_age + ")\">";
          if (profile.avatar) {
            html += "<img src='../server/images/" + profile.avatar + "' alt='" + profile.name + "' />";
          }
          html += "<p>" + profile.name + "</p>";
          html += "</article>";
        }
        html += "</div>";
        content.innerHTML = html;
      };

      V.renderMoviesByCategory = function(groupedMovies, favorites) {
        let content = document.querySelector("#content");
        let categories = Object.keys(groupedMovies);
        if (categories.length === 0) {
          content.innerHTML = "<p>Aucun film disponible pour votre tranche d'âge.</p>";
          return;
        }
        let html = "";
        for (let i = 0; i < categories.length; i++) {
          let categoryName = categories[i];
          html += MovieCategory.format(categoryName, groupedMovies[categoryName], favorites);
        }
        content.innerHTML = html;
      };

      V.renderDetail = function(movie, isFavorite) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(movie, isFavorite);
      };

      V.renderProfile = function(profile, favorites) {
        let content = document.querySelector("#content");
        content.innerHTML = Profile.format(profile, favorites);
      };

      C.start();
    </script>
  </body>
</html>
