<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 ADMIN</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
    <link
      rel="icon"
      type="image/x-icon"
      href="../server/images/admin icon.png"
    />
  </head>
  <body>
    <section id="log"></section>
    <section id="form"></section>
    <hr />
    <section id="profile"></section>

    <script type="module">
      import { Log } from "./component/Log/script.js";
      import { MovieForm } from "./component/MovieForm/script.js";
      import { ProfileForm } from "./component/ProfileForm/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { DataProfile } from "./data/dataProfile.js";

      window.C = {};

      C.start = function () {
        V.renderLog("Démarrage de l'application");
        V.renderMovieForm();
        V.renderProfileForm();
        document
          .querySelector(".btn-approve")
          .addEventListener("click", C.addMovie);
        document
          .querySelector(".btn-approve-profile")
          .addEventListener("click", C.handlerAddProfile);
      };

      C.addMovie = async function () {
        try {
          let form = document.querySelector("#movie-form");
          let fdata = new FormData(form);
          let result = await DataMovie.add(fdata);
          V.renderLog(result);
        } catch (error) {
          V.renderLog("Erreur : " + error.message);
        }
      };

      C.handlerAddProfile = async function () {
        try {
          let form = document.querySelector("#profile-form");
          let fdata = new FormData(form);
          let result = await DataProfile.add(fdata);
          V.renderLog(result);
        } catch (error) {
          V.renderLog("Erreur : " + error.message);
        }
      };

      window.V = {};

      V.renderLog = function (txt) {
        let content = document.querySelector("#log");
        content.innerHTML = Log.format(txt);
      };

      V.renderMovieForm = function () {
        let content = document.querySelector("#form");
        content.innerHTML = MovieForm.format();
      };

      V.renderProfileForm = function () {
        let content = document.querySelector("#profile");
        content.innerHTML = ProfileForm.format();
      };

      C.start();
    </script>
  </body>
</html>
