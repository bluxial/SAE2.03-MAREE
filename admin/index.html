<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 ADMIN</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
    <link
      rel="icon"
      type="image/x-icon"
      href="../server/images/admin icon.png"
    />
  </head>
  <body>
    <section id="log"></section>
    <section id="form"></section>

    <script type="module">
      import { Log } from "./component/Log/script.js";
      import { Form } from "./component/Form/script.js";
      import { DataMovie } from "./data/dataMovie.js";

      window.C = {};

      C.start = function () {
        V.renderLog("Démarrage de l'application");
        V.renderForm();
        document
          .querySelector(".btn-approve")
          .addEventListener("click", C.addMovie);
      };

      C.addMovie = async function () {
        let form = document.querySelector("#movie-form");
        let fdata = new FormData(form);
        let result = await DataMovie.add(fdata);
        V.renderLog(result);
      };

      window.V = {};

      V.renderLog = function (txt) {
        let content = document.querySelector("#log");
        content.innerHTML = Log.format(txt);
      };

      V.renderForm = function () {
        let content = document.querySelector("#form");
        content.innerHTML = Form.format();
      };

      C.start();
    </script>
  </body>
</html>
