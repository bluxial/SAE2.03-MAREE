<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 ADMIN</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="icon" type="image/x-icon" href="../server/images/admin icon.png" />
  </head>
  <body>
    <section id="log"></section>
    <section id="form" class="flex justify-center items-center"></section>
    <hr />
    <section id="profile" class="flex justify-center"></section>
    <section id="profiles-list" class="flex justify-center"></section>

    <script type="module">
      import { Log } from "./component/Log/script.js";
      import { MovieForm } from "./component/MovieForm/script.js";
      import { ProfileForm } from "./component/ProfileForm/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { DataProfile } from "./data/dataProfile.js";

      window.C = {};

      C.start = function() {
        V.renderLog("Démarrage de l'application");
        V.renderMovieForm();
        V.renderProfileForm();
        document.querySelector(".btn-approve").addEventListener("click", C.addMovie);
        document.querySelector(".btn-approve-profile").addEventListener("click", C.handlerSaveProfile);
        C.loadProfiles();
      };

      C.addMovie = async function() {
        let form = document.querySelector("#movie-form");
        let fdata = new FormData(form);
        let result = await DataMovie.add(fdata);
        V.renderLog(result);
      };

      C.handlerSaveProfile = async function() {
        let form = document.querySelector("#profile-form");
        let fdata = new FormData(form);
        let id = fdata.get("id");
        let result;
        if (id && id !== "") {
          result = await DataProfile.save(fdata);
        } else {
          result = await DataProfile.add(fdata);
        }
        V.renderLog(result);
        form.reset();
        C.loadProfiles();
      };

      C.loadProfiles = async function() {
        let profiles = await DataProfile.read();
        V.renderProfilesList(profiles);
      };

      C.handlerSelectProfile = function(id, name, avatar, min_age) {
        let form = document.querySelector("#profile-form");
        form.querySelector("[name='id']").value = id;
        form.querySelector("[name='name']").value = name;
        form.querySelector("[name='avatar']").value = avatar;
        form.querySelector("[name='min_age']").value = min_age;
      };

      window.V = {};

      V.renderLog = function(txt) {
        let content = document.querySelector("#log");
        content.innerHTML = Log.format(txt);
      };

      V.renderMovieForm = function() {
        let content = document.querySelector("#form");
        content.innerHTML = MovieForm.format();
      };

      V.renderProfileForm = function() {
        let content = document.querySelector("#profile");
        content.innerHTML = ProfileForm.format();
      };

      V.renderProfilesList = function(profiles) {
        let content = document.querySelector("#profiles-list");
        let html = "<ul class='flex flex-col gap-sm'>";
        for (let i = 0; i < profiles.length; i++) {
          let p = profiles[i];
          html += "<li class='flex items-center justify-between'>";
          html += p.name + " (âge min : " + p.min_age + ")";
          html += ' <button onclick="C.handlerSelectProfile(' + p.id + ", '" + p.name + "', '" + (p.avatar || "") + "', " + p.min_age + ')">Modifier</button>';
          html += "</li>";
        }
        html += "</ul>";
        content.innerHTML = html;
      };

      C.start();
    </script>
  </body>
</html>
